query RunInput {
  cart {
    lines {
      id
      quantity
      attribute(key: "_upsell") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          minQuantity: metafield(namespace: "custom", key: "min_item") {
            value
          }
          discountPercent: metafield(
            namespace: "custom"
            key: "discount_percent"
          ) {
            value
          }
        }
      }
    }
  }
}
